<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Monte seu pedido de pallets online e envie para nosso WhatsApp. Simulação rápida e preços competitivos para pallets novos e usados em Benevides."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fabaogas.com.br/orcamento.html" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fabaogas.com.br/orcamento.html" />
    <meta
      property="og:title"
      content="Solicitar Orçamento de Pallets Online | Fabão Gás"
    />
    <meta
      property="og:description"
      content="Escolha seus pallets e receba uma cotação personalizada via WhatsApp em poucos minutos."
    />
    <meta property="og:image" content="img/Logo.png" />

    <title>Solicitar Orçamento de Pallets Online | Fabão Gás</title>

    <link rel="stylesheet" href="css/estilo.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="navbar">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <i class="fa-solid fa-box" style="color: var(--azul)"></i>
        </div>
        <div class="logo-text">PALLETS<span>BR</span></div>
      </a>
      <nav>
        <a href="index.html">Início</a>
        <a href="produtos.html">Produtos</a>
        <a href="contato.html">Contato</a>
        <a href="orcamento.html" class="btn-orcamento">Meu Orçamento</a>
      </nav>
    </header>

    <section id="orcamento">
      <div class="container">
        <div class="sec-tag">Finalização</div>
        <h2 class="sec-title">Revise seu Pedido</h2>

        <div class="orc-layout">
          <div class="orc-lista">
            <!-- Item de Exemplo -->
            <div class="orc-item">
              <div class="prod-icon">
                <img src="img/palete.png" alt="Pallet" />
              </div>
              <div class="orc-item-nome">
                Pallet Padrão PBR
                <div class="orc-item-dim">1000 x 1200 mm</div>
              </div>
              <div class="orc-qtd">
                <button class="qtd-btn" aria-label="Remover uma unidade">
                  −
                </button>
                <input
                  type="number"
                  class="qtd-num"
                  value="10"
                  aria-label="Quantidade do produto"
                />
                <button class="qtd-btn" aria-label="Adicionar uma unidade">
                  +
                </button>
              </div>
              <div class="orc-preco">Sob Consulta</div>
            </div>

            <div class="orc-item">
              <div class="prod-icon">
                <img src="img/palete.png" alt="Pallet" />
              </div>
              <div class="orc-item-nome">
                Pallet Euro EPAL
                <div class="orc-item-dim">800 x 1200 mm</div>
              </div>
              <div class="orc-qtd">
                <button class="qtd-btn" aria-label="Remover uma unidade">
                  −
                </button>
                <input
                  type="number"
                  class="qtd-num"
                  value="5"
                  aria-label="Quantidade do produto"
                />
                <button class="qtd-btn" aria-label="Adicionar uma unidade">
                  +
                </button>
              </div>
              <div class="orc-preco">Sob Consulta</div>
            </div>
          </div>

          <aside class="orc-resumo">
            <h3 class="orc-resumo-title">Resumo do Orçamento</h3>
            <div class="resumo-linha">
              <span>Itens selecionados:</span>
              <span class="resumo-val">2 tipos</span>
            </div>
            <div class="resumo-linha">
              <span>Quantidade total:</span>
              <span class="resumo-val">15 unidades</span>
            </div>

            <div class="resumo-total">
              <span class="resumo-total-lbl">Total estimado</span>
              <span class="resumo-total-val">R$ ---</span>
            </div>

            <input
              type="text"
              class="orc-nome-input"
              placeholder="Seu Nome Completo"
            />
            <input
              type="email"
              class="orc-nome-input"
              placeholder="Seu E-mail"
            />

            <button class="btn-whatsapp">
              <i class="fa-brands fa-whatsapp"></i>
              Enviar via WhatsApp
            </button>
          </aside>
        </div>
      </div>
    </section>
  </body>
</html>

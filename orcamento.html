<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Monte seu pedido de pallets online e envie para nosso WhatsApp. Simulação rápida e preços competitivos para pallets novos e usados em Benevides."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fabaogas.com.br/orcamento.html" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fabaogas.com.br/orcamento.html" />
    <meta
      property="og:title"
      content="Solicitar Orçamento de Pallets Online | Fabão Gás"
    />
    <meta
      property="og:description"
      content="Escolha seus pallets e receba uma cotação personalizada via WhatsApp em poucos minutos."
    />
    <meta property="og:image" content="img/Logo.png" />

    <title>Solicitar Orçamento de Pallets Online | Fabão Gás</title>

    <link rel="stylesheet" href="css/estilo.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="navbar">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <img src="img/Logo.png" alt="Logo" width="50" />
        </div>
        <span class="logo-text"><span>FABÃO</span>GÁS</span>
      </a>
      <nav id="nav-menu">
        <a href="index.html">Home</a>
        <a href="sobre.html">Sobre</a>
        <a href="produtos.html">Produtos</a>
        <a href="orcamento.html" class="active">Orçamento</a>
        <a href="contato.html">Contato</a>
      </nav>
      <button class="hamburger" id="menu-toggle">
        <span></span><span></span><span></span>
      </button>
    </header>

    <section id="orcamento" class="scroll-reveal">
      <div class="container">
        <div class="sec-tag">Finalização</div>
        <h2 class="sec-title">Revise seu Pedido</h2>

        <div class="orc-layout">
          <div class="orc-lista" id="lista-orc"></div>

          <aside class="orc-resumo">
            <h3 class="orc-resumo-title">Resumo do Orçamento</h3>
            <div id="resumo-itens"></div>

            <div class="resumo-linha">
              <span>Quantidade total:</span>
              <span class="resumo-val" id="total-val">0</span>
            </div>

            <input
              type="text"
              class="orc-nome-input"
              id="cliente-nome"
              placeholder="Seu Nome ou Empresa"
            />
            <input
              type="tel"
              class="orc-nome-input"
              id="cliente-tel"
              placeholder="Telefone (WhatsApp)"
            />

            <button class="btn-whatsapp" onclick="enviarWhatsApp()">
              <i class="fa-brands fa-whatsapp"></i>
              Enviar via WhatsApp
            </button>
          </aside>
        </div>
      </div>
    </section>

    <script src="scripts.js"></script>
  </body>
</html>
